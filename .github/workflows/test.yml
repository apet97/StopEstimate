name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: mvnw -B test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run unit tests
        run: ./mvnw -B -ntp test

      - name: Upload surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports
          retention-days: 7

  integration-tests:
    name: mvnw -B verify (Testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run verify (unit + Testcontainers IT)
        run: ./mvnw -B -ntp verify

      - name: Upload surefire + failsafe reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: it-reports
          path: |
            target/surefire-reports
            target/failsafe-reports
          retention-days: 7
