name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Thursdays 07:00 UTC — avoids colliding with Monday's security-scan + Dependabot window.
    - cron: "0 7 * * 4"

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL / java-kotlin
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          # pom.xml pulls com.cake.clockify:addon-sdk from maven.pkg.github.com/clockify/addon-java-sdk.
          # CodeQL must resolve this during the build phase, so the same token wiring as the
          # test workflow is required.
          server-id: github
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          queries: security-and-quality

      - name: Build
        env:
          # secrets.* and github.actor (authenticated principal) only — no PR-supplied user
          # input is interpolated into run: here.
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_PASSWORD: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: ./mvnw -B -ntp -DskipTests package

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:java-kotlin
