name: coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  jacoco:
    name: mvnw -P coverage verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          server-id: github
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Run coverage profile
        env:
          # secrets.* and github.actor (authenticated principal) only — no PR-supplied user
          # input is interpolated into run: here.
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_PASSWORD: ${{ secrets.GH_PACKAGES_TOKEN }}
        # The coverage profile runs jacoco:prepare-agent + jacoco:report + jacoco:check.
        # haltOnFailure=false in the profile keeps this informational until a baseline is set;
        # tighten the 60% line / 50% branch thresholds in pom.xml when ready.
        run: ./mvnw -B -ntp -P coverage verify

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report
          path: |
            target/site/jacoco
            target/jacoco.exec
          retention-days: 14
