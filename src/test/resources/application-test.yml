spring:
  datasource:
    url: jdbc:h2:mem:stopatestimate;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true
    locations: classpath:db/migration-test
    baseline-on-migrate: true

addon:
  key: stop-at-estimate
  name: "Stop @ Estimate"
  base-url: https://example.test
  sidebar-label: "Stop @ Estimate"
  default-reset-cadence: NONE
  # Test-only hex values; distinct from any checked-in example to satisfy the
  # SecurityConfig anti-default guard.
  encryption-key-hex: deadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeef
  encryption-salt-hex: cafebabecafebabecafebabecafebabe

clockify:
  cutoff:
    interval-ms: 60000

logging:
  level:
    root: WARN
    com.devodox.stopatestimate: INFO
    org.hibernate.orm.deprecation: ERROR
