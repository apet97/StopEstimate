spring:
  application:
    name: stop-at-estimate
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/stop_at_estimate}
    username: ${SPRING_DATASOURCE_USERNAME:stop_at_estimate}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  web:
    resources:
      # E3: content-hash strategy fingerprints /css/sidebar.css → /css/sidebar-<sha>.css
      # at request time. sidebar.html uses Thymeleaf @{/...} URL expressions, which
      # Spring rewrites through ResourceUrlEncoder when the chain is enabled. Hashed
      # URLs are deploy-stable per-content, so we can ship a long max-age without
      # risking a stale asset after a deploy — the hash flips and the browser
      # requests a fresh URL.
      chain:
        cache: true
        strategy:
          content:
            enabled: true
            paths: /**
      cache:
        cachecontrol:
          max-age: 365d
          public: true

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  error:
    include-message: never
    include-stacktrace: never
    include-exception: false
    include-binding-errors: never
  tomcat:
    accesslog:
      enabled: ${TOMCAT_ACCESSLOG_ENABLED:false}
      directory: /tmp
      prefix: stopatestimate-access
      suffix: .log
      pattern: "%t %a %r %s %D"

management:
  endpoints:
    web:
      exposure:
        # B1/B2: operators scrape /actuator/prometheus. SecurityConfig allows this endpoint
        # explicitly; /actuator/health/liveness|readiness fall under the /actuator/health/**
        # permit rule for K8s/Nomad probes.
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
      # Liveness + readiness probes (/actuator/health/liveness|readiness). Spring wires them
      # automatically when this flag is on and injects k8s-friendly default indicators
      # (readiness waits for ApplicationContext ready, liveness flips on shutdown).
      probes:
        enabled: true
    prometheus:
      access: read_only
  prometheus:
    metrics:
      export:
        enabled: true
  # B3: RestClient calls now use URI templates ({ws}, {p}, {userId}, ...) so Micrometer records
  # one tag per endpoint template, not per workspace/project/user. The previous max-uri-tags: 500
  # bandaid is gone — the default cap of 100 is more than enough for the ~10 distinct Clockify
  # endpoints this addon hits.

addon:
  key: ${ADDON_KEY:stop-at-estimate}
  name: ${ADDON_NAME:Stop @ Estimate}
  description: ${ADDON_DESCRIPTION:Stops timers and locks projects when time or budget estimates are reached.}
  # No default — operators must set ADDON_BASE_URL. A startup validator rejects blank values
  # and well-known placeholder URLs so a misconfigured deploy can't publish a broken manifest.
  base-url: ${ADDON_BASE_URL:}
  sidebar-label: ${ADDON_SIDEBAR_LABEL:Stop @ Estimate}
  default-reset-cadence: ${ADDON_DEFAULT_RESET_CADENCE:NONE}
  # No defaults — operators MUST set these env vars. The app fails fast at startup
  # if they are missing or set to any known checked-in example value.
  encryption-key-hex: ${APP_ENCRYPTION_KEY_HEX:}
  encryption-salt-hex: ${APP_ENCRYPTION_SALT_HEX:}

clockify:
  cutoff:
    interval-ms: ${CLOCKIFY_CUTOFF_INTERVAL_MS:60000}
  guard-events:
    # ISO-8601 duration; rows older than (now - retention) are purged nightly.
    retention: ${CLOCKIFY_GUARD_EVENTS_RETENTION:P30D}
    # Default: 03:15 UTC daily (15m after the webhook-events cleanup tick).
    purge-cron: ${CLOCKIFY_GUARD_EVENTS_PURGE_CRON:0 15 3 * * *}

logging:
  level:
    root: INFO
    com.devodox.stopatestimate: INFO
